<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>
  <link href="styles.css" rel="stylesheet"/> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
     <div class="content">
    <div class="image">
      <picture>
  <!-- Desktop image -->
  <source srcset="images/image-product-desktop.jpg" media="(min-width: 768px)">
  
  <!-- Mobile image (default fallback) -->
  <img src="images/image-product-mobile.jpg" alt="Product image">
</picture>
    </div>
    <div class="content-text">
      <p class="product-type">PERFUME</p>

  <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>

  <p class="product-description">
    A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.
  </p>
  <div class="price">
  <p class="discount">$149.99</p> 
  <p class="original">$169.99</p>
  </div>
 

  <button type="button"><img src="images/icon-cart.svg" alt="" aria-hidden="true">Add to Cart</button>
  </div>
    </div>
  </main>
</body>
</html>
